#Info SpringBoot Microservices App
spring.application.name=msc-service
spring.info.build.encoding=UTF-8

#Spring DataSource Basic Config
spring.datasource.url=jdbc:postgresql://localhost:5432/db_test
#spring.datasource.url=jdbc:postgresql://service-postgres-server:5432/db_test
spring.datasource.username=postgres
#spring.datasource.username=ybzlljrhplsksf
spring.datasource.password=admin
#spring.datasource.password=373898ff57327723027109fcbc0b710a1946554fab86cd59540c2defa5fd18c2
spring.datasource.driver-class-name=org.postgresql.Driver

##Hibernate ORM
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
#spring.jpa.hibernate.ddl-auto=create
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.jdbc.lob.non.contextual_creation=true
spring.jpa.open-in-view=true
spring.main.allow-circular-references=true
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER

spring.jackson.time-zone=America/Guayaquil
spring.jackson.locale=es_EC
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Tomcat Server Basic Config
server.port=8080
server.servlet.context-path=/mscServices
server.max-http-header-size=8KB
server.tomcat.max-swallow-size=2MB

#Tomcat Server Access Logs
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.file-date-format=yyyy-MM-dd
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log

#Logs
logging.file.name=/tmp/msc-service.log
logging.level.org.springframework=INFO
#logging.level.org.hibernate=INFO
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE